  {spellings:["argument"], ipa:"/ňą…Ďňź…°jum…ônt/", sentence:"They had an argument yesterday."},
  {spellings:["bizarre"], ipa:"/b…™ňąz…Ďňź(r)/", sentence:"That was a bizarre situation."},

  {spellings:["classification"], ipa:"/ňĆkl√¶s…™f…™ňąke…™ É…ôn/", sentence:"The classification was incorrect."},
  {spellings:["collaboration"], ipa:"/k…ôňĆl√¶b…ôňąre…™ É…ôn/", sentence:"The project requires collaboration."},
  {spellings:["compensation"], ipa:"/ňĆk…ímpenňąse…™ É…ôn/", sentence:"He received compensation."},
  {spellings:["controversial"], ipa:"/ňĆk…íntr…ôňąv…úňź É…ôl/", sentence:"This topic is controversial."},
  {spellings:["curiosity"], ipa:"/ňĆkj ä…ôriňą…ís…ôti/", sentence:"Curiosity drives learning."},
  {spellings:["definitely"], ipa:"/ňądef…™n…ôtli/", sentence:"I will definitely join."},
  {spellings:["discipline"], ipa:"/ňąd…™s…ôpl…™n/", sentence:"Discipline is important."},
  {spellings:["embarrassment"], ipa:"/…™mňąb√¶r…ôsm…ônt/", sentence:"He felt embarrassment."},

  {spellings:["facilitate"], ipa:"/f…ôňąs…™l…™te…™t/", sentence:"Technology facilitates communication."},
  {spellings:["hierarchy"], ipa:"/ňąha…™…ôr…Ďňźki/", sentence:"The company has a clear hierarchy."},

  {spellings:["procedure"], ipa:"/pr…ôňąsiňźd í…ô(r)/", sentence:"Follow the procedure carefully."},
  {spellings:["psychological"], ipa:"/ňĆsa…™k…ôňąl…íd í…™k…ôl/", sentence:"It has psychological effects."},
  {spellings:["recommendation"], ipa:"/ňĆrek…ômenňąde…™ É…ôn/", sentence:"Thank you for your recommendation."},
  {spellings:["responsibility"], ipa:"/r…™ňĆsp…íns…ôňąb…™l…ôti/", sentence:"This is your responsibility."},
  {spellings:["significant"], ipa:"/s…™…°ňąn…™f…™k…ônt/", sentence:"This is a significant change."},
  {spellings:["strategy"], ipa:"/ňąstr√¶t…ôd íi/", sentence:"We need a new strategy."},
  {spellings:["substantial"], ipa:"/s…ôbňąst√¶n É…ôl/", sentence:"The increase is substantial."},
  {spellings:["technology"], ipa:"/tekňąn…íl…ôd íi/", sentence:"Technology is evolving fast."},
  {spellings:["throughout"], ipa:"/őłruňźňąa ät/", sentence:"He worked throughout the night."},
  {spellings:["ultimately"], ipa:"/ňą Ćlt…™m…ôtli/", sentence:"Ultimately, we succeeded."},

  // ŗłēŗłĪŗłßŗł≠ŗłĘŗĻąŗł≤ŗłáŗłĄŗł≥ŗłóŗłĶŗĻąŗł™ŗłįŗłĀŗłĒŗĻĄŗłĒŗĻČ 2 ŗĻĀŗłöŗłö
  {spellings:["colour","color"], ipa:"/ňąk Ćl…ô(r)/", sentence:"What is your favourite colour?"},
  {spellings:["favourite","favorite"], ipa:"/ňąfe…™v…ôr…™t/", sentence:"Blue is my favourite color."},
  {spellings:["organise","organize"], ipa:"/ňą…Ēňź…°…ôna…™z/", sentence:"We need to organise the event."},
  {spellings:["analyse","analyze"], ipa:"/ňą√¶n…ôla…™z/", sentence:"Please analyse the data carefully."},
  {spellings:["centre","center"], ipa:"/ňąsent…ô(r)/", sentence:"They met at the shopping centre."},
  {spellings:["theatre","theater"], ipa:"/ňąőł…™…ôt…ô(r)/", sentence:"We went to the theatre last night."},
  {spellings:["travelling","traveling"], ipa:"/ňątr√¶v…ôl…™Ňč/", sentence:"She loves travelling around the world."},
  {spellings:["defence","defense"], ipa:"/d…™ňąfens/", sentence:"The team played good defence today."},
  {spellings:["licence","license"], ipa:"/ňąla…™s…ôns/", sentence:"He showed his driving licence."},
  {spellings:["honour","honor"], ipa:"/ňą…ín…ô(r)/", sentence:"It is an honour to meet you."}
];

// ===============================
// GAME VARIABLES
// ===============================
let current = 0;
let order = [];
let score = 0;
let answered = false;

// ===============================
// SHUFFLE
// ===============================
function shuffle(){
  order = [...Array(words.length).keys()].sort(() => Math.random() - 0.5);
}

// ===============================
// START GAME
// ===============================
function start(){
  if(words.length !== 50){
    alert("Please prepare exactly 50 words before starting. Current total = " + words.length);
    return;
  }

  shuffle();
  current = 0;
  score = 0;
  answered = false;
  document.getElementById("summary").innerText = "";
  loadWord();
}

// ===============================
// LOAD WORD
// ===============================
function loadWord(){
  let w = words[order[current]];
  let mainWord = w.spellings[0];

  let hiddenSentence = w.sentence.replace(new RegExp(mainWord, "gi"), "_____");
  document.getElementById("sentence").innerText = hiddenSentence;
  document.getElementById("ipa").innerText = w.ipa || "";
  document.getElementById("progress").innerText = (current + 1) + " / " + words.length;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
  answered = false;
}

// ===============================
// SPEAK
// ===============================
function speak(text){
  let u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function speakWord(){
  speak(words[order[current]].spellings[0]);
}

function speakSentence(){
  speak(words[order[current]].sentence);
}

// ===============================
// CHECK ANSWER
// ===============================
function check(){
  if(answered) return;

  let ans = document.getElementById("answer").value.trim().toLowerCase();
  let accepted = words[order[current]].spellings.map(x => x.toLowerCase());

  if(accepted.includes(ans)){
    document.getElementById("result").innerText = "‚úÖ Correct";
    score++;
  } else {
    document.getElementById("result").innerText =
      "‚ĚĆ Correct: " + words[order[current]].spellings.join(" / ");
  }

  answered = true;
}

// ===============================
// NEXT
// ===============================
function next(){
  if(!answered){
    alert("Please press Check first.");
    return;
  }

  if(current < words.length - 1){
    current++;
    loadWord();
  } else {
    finishGame();
  }
}

// ===============================
// FINISH
// ===============================
function finishGame(){
  document.getElementById("sentence").innerText = "ūüéČ Finished!";
  document.getElementById("ipa").innerText = "";
  document.getElementById("progress").innerText = "Completed";
  document.getElementById("result").innerText = "";
  document.getElementById("summary").innerText =
    "Your score: " + score + " / 50";
}

// ===============================
// LOAD CUSTOM 50 WORDS
// ŗł£ŗłĻŗłõŗĻĀŗłöŗłö:
// 1 ŗłĄŗł≥ŗłēŗĻąŗł≠ 1 ŗłöŗł£ŗł£ŗłóŗłĪŗłĒ
// ŗĻĄŗł°ŗĻąŗłēŗĻČŗł≠ŗłáŗĻÉŗł™ŗĻąŗĻÄŗł•ŗłā
//
// ŗłĖŗĻČŗł≤ŗłĄŗł≥ŗĻĄŗłęŗłôŗł°ŗłĶ 2 ŗĻĀŗłöŗłö ŗĻÉŗłęŗĻČŗłěŗłīŗł°ŗłěŗĻĆŗĻĀŗłöŗłöŗłôŗłĶŗĻČ:
// colour|color
// organise|organize
// centre|center
// ===============================
function loadCustomWords(){
  let raw = document.getElementById("wordInput").value.trim();

  if(!raw){
    alert("Please paste 50 words first.");
    return;
  }

  let lines = raw
    .split("\n")
    .map(x => x.trim())
    .filter(x => x !== "");

  if(lines.length !== 50){
    alert("Please paste exactly 50 lines. Now you have " + lines.length + " words.");
    return;
  }

  words = lines.map(line => {
    let spellings = line
      .split("|")
      .map(x => x.trim().toLowerCase())
      .filter(x => x !== "");

    return {
      spellings: spellings,
      ipa: "",
      sentence: "Spell the word."
    };
  });

  alert("Loaded successfully: 50 words");
  document.getElementById("summary").innerText = "Ready: 50 words loaded";
  document.getElementById("sentence").innerText = "Press Start";
  document.getElementById("progress").innerText = "";
  document.getElementById("ipa").innerText = "";
  document.getElementById("result").innerText = "";
}
</script>
