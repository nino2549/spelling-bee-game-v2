<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Bee Hard B1-B2</title>
<style>
body{font-family:sans-serif;background:#f0f4ff;padding:20px;text-align:center}
button,input{padding:10px;font-size:16px;margin:5px}
.box{background:white;padding:20px;border-radius:12px;max-width:500px;margin:auto}
</style>
</head>
<body>
<div class="box">
<h2>Spelling Bee (Hard B1-B2)</h2>
<p id="sentence">Press start</p>
<input id="answer" placeholder="Type word"/>
<br>
<button onclick="speakWord()">🔊 Word</button>
<button onclick="speakSentence()">🗣 Sentence</button>
<br>
<button onclick="check()">Check</button>
<button onclick="next()">Next</button>
<p id="result"></p>
</div>

<script>
const words = [
  {word:"accommodation", sentence:"We booked accommodation near the beach."},
  {word:"acknowledge", sentence:"She refused to acknowledge her mistake."},
  {word:"appearance", sentence:"His appearance surprised everyone in the room."},
  {word:"argument", sentence:"Their argument lasted for several minutes."},
  {word:"association", sentence:"She has a close association with the school."},
  {word:"authority", sentence:"The manager has the authority to approve the plan."},
  {word:"available", sentence:"The teacher is available after class today."},
  {word:"beneficial", sentence:"Regular reading is beneficial for language learning."},
  {word:"boundary", sentence:"The fence marks the boundary of the property."},
  {word:"campaign", sentence:"The school started a campaign to reduce waste."},

  {word:"category", sentence:"This book belongs to a different category."},
  {word:"committee", sentence:"The committee will announce the results tomorrow."},
  {word:"communicate", sentence:"It is important to communicate clearly in meetings."},
  {word:"community", sentence:"The community worked together to clean the park."},
  {word:"competition", sentence:"The competition was tougher than we expected."},
  {word:"conclusion", sentence:"We reached the conclusion after careful discussion."},
  {word:"confidence", sentence:"Practice helped her build confidence before the speech."},
  {word:"convenient", sentence:"Online banking is very convenient for busy people."},
  {word:"curiosity", sentence:"His curiosity led him to ask many questions."},
  {word:"definitely", sentence:"I will definitely join the science club next term."},

  {word:"description", sentence:"Her description of the event was very detailed."},
  {word:"destination", sentence:"Bangkok was our final destination."},
  {word:"determined", sentence:"She was determined to finish the project on time."},
  {word:"development", sentence:"Technology plays a major role in development."},
  {word:"difference", sentence:"There is a clear difference between the two answers."},
  {word:"difficulty", sentence:"He had difficulty understanding the instructions."},
  {word:"education", sentence:"Education can open many doors in life."},
  {word:"effective", sentence:"This method is more effective than the old one."},
  {word:"emergency", sentence:"Call this number in case of an emergency."},
  {word:"encourage", sentence:"Parents should encourage children to read more."},

  {word:"environment", sentence:"We must protect the environment for future generations."},
  {word:"equipment", sentence:"The laboratory equipment is very expensive."},
  {word:"especially", sentence:"I enjoy all sports, especially badminton."},
  {word:"evidence", sentence:"The police found evidence near the building."},
  {word:"excellent", sentence:"Her pronunciation is excellent."},
  {word:"experience", sentence:"Traveling alone was a valuable experience."},
  {word:"familiar", sentence:"This song sounds familiar to me."},
  {word:"frequently", sentence:"She frequently visits the library after school."},
  {word:"government", sentence:"The government introduced a new policy last week."},
  {word:"guarantee", sentence:"Hard work does not always guarantee success."},

  {word:"hesitate", sentence:"Do not hesitate to ask questions in class."},
  {word:"identity", sentence:"Each student must show proof of identity."},
  {word:"immediately", sentence:"Please submit your work immediately after finishing."},
  {word:"independent", sentence:"He became more independent after moving away."},
  {word:"individual", sentence:"Each individual has different strengths."},
  {word:"influence", sentence:"Friends can influence your decisions."},
  {word:"necessary", sentence:"It is necessary to wear a helmet here."},
  {word:"opportunity", sentence:"This competition is a good opportunity to improve."},
  {word:"pronunciation", sentence:"Good pronunciation makes communication easier."},
  {word:"responsibility", sentence:"Cleaning the room is your responsibility."}
];

let current = 0;

function speak(text){
 let u = new SpeechSynthesisUtterance(text);
 u.lang="en-US";
 speechSynthesis.speak(u);
}

function speakWord(){ speak(words[current].word); }
function speakSentence(){ speak(words[current].sentence); }

function check(){
 let ans=document.getElementById("answer").value.toLowerCase();
 if(ans===words[current].word){
  document.getElementById("result").innerText="✅ Correct";
 }else{
  document.getElementById("result").innerText="❌ "+words[current].word;
 }
}

function next(){
 current=(current+1)%words.length;
 document.getElementById("sentence").innerText=words[current].sentence.replace(new RegExp(words[current].word,"gi"),"_____");
 document.getElementById("answer").value="";
 document.getElementById("result").innerText="";
}

</script>
</body>
</html>
