let current = 0;

function shuffle(){
 order = [...Array(words.length).keys()]
   .sort(()=>Math.random()-0.5);
}

function start(){
 shuffle();
 current = 0;
 loadWord();
}

function loadWord(){
 let w = words[order[current]];

 document.getElementById("sentence").innerText =
   w.sentence.replace(new RegExp(w.word,"gi"),"_____");

 document.getElementById("ipa").innerText = w.ipa;
 document.getElementById("progress").innerText =
   (current+1) + " / " + words.length;

 document.getElementById("answer").value="";
 document.getElementById("result").innerText="";
}

function speak(text){
 let u = new SpeechSynthesisUtterance(text);
 u.lang="en-US";
 speechSynthesis.speak(u);
}

function speakWord(){

}

function speakSentence(){
 speak(words[order[current]].sentence);
}

function check(){
 let ans = document.getElementById("answer").value.toLowerCase();
 let correct = words[order[current]].word;

 if(ans === correct){
   document.getElementById("result").innerText="‚úÖ Correct";
 }else{

}

function next(){
 if(current < words.length-1){
   current++;
