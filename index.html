<script>
  let words = [];
  let order = [];
  let current = 0;

  let userAnswers = [];
  let checkedStatus = [];

  function uploadWords() {
    const text = document.getElementById("wordInput").value.trim();
    const uploadMsg = document.getElementById("uploadMsg");

    if (!text) {
      uploadMsg.innerText = "❌ Please paste 50 lines first.";
      return;
    }

    const lines = text
      .split("\n")
      .map(line => line.trim())
      .filter(line => line !== "");

    if (lines.length !== 50) {
      uploadMsg.innerText = "❌ You must enter exactly 50 lines. Current: " + lines.length;
      return;
    }

    const parsedWords = [];
    const seen = new Set();

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const parts = line.split("|");

      if (parts.length < 2) {
        uploadMsg.innerText = `❌ Line ${i + 1} is invalid. Use format: word|sentence`;
        return;
      }

      const word = parts[0].trim();
      const sentence = parts.slice(1).join("|").trim();

      if (!word || !sentence) {
        uploadMsg.innerText = `❌ Line ${i + 1} is incomplete.`;
        return;
      }

      const lowerWord = word.toLowerCase();
      if (seen.has(lowerWord)) {
        uploadMsg.innerText = `❌ Duplicate word found: ${word}`;
        return;
      }
      seen.add(lowerWord);

      parsedWords.push({
        word: word,
        sentence: sentence
      });
    }

    words = parsedWords;

    document.getElementById("wordInput").value = "";
    document.getElementById("uploadMsg").innerText = "";

    document.getElementById("uploadPage").classList.add("hidden");
    document.getElementById("summaryPage").classList.add("hidden");
    document.getElementById("gamePage").classList.remove("hidden");

    startGame();
  }

  function shuffleArray(arr) {
    const newArr = [...arr];
    for (let i = newArr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
  }

  function startGame() {
    order = shuffleArray([...Array(words.length).keys()]);
    current = 0;
    userAnswers = new Array(words.length).fill("");
    checkedStatus = new Array(words.length).fill(null);
    loadWord();
    updateLiveScore();
  }

  function restartGame() {
    document.getElementById("summaryPage").classList.add("hidden");
    document.getElementById("uploadPage").classList.add("hidden");
    document.getElementById("gamePage").classList.remove("hidden");
    startGame();
  }

  function goBackToUpload() {
    words = [];
    order = [];
    current = 0;
    userAnswers = [];
    checkedStatus = [];

    document.getElementById("summaryPage").classList.add("hidden");
    document.getElementById("gamePage").classList.add("hidden");
    document.getElementById("uploadPage").classList.remove("hidden");

    document.getElementById("wordInput").value = "";
    document.getElementById("uploadMsg").innerText = "";
  }

  function loadWord() {
    if (!words.length) return;

    const item = words[order[current]];
    document.getElementById("progress").innerText = `${current + 1} / ${words.length}`;
    document.getElementById("sentence").innerHTML = `Please spell the word _____ .<br><br>${item.sentence}`;
    document.getElementById("answer").value = userAnswers[current] || "";
    document.getElementById("result").innerText = "";
    document.getElementById("answer").focus();
  }

  function updateLiveScore() {
    let score = checkedStatus.filter(v => v === true).length;
    document.getElementById("liveScore").innerText = `Score: ${score}`;
  }

  function speak(text) {
    if (!text) return;

    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    utterance.rate = 0.9;
    utterance.pitch = 1;
    speechSynthesis.speak(utterance);
  }

  function speakWord() {
    if (!words.length) return;
    const item = words[order[current]];
    speak(item.word);
  }

  function speakSentence() {
    if (!words.length) return;
    const item = words[order[current]];
    speak(item.sentence);
  }

  function checkAnswer() {
    if (!words.length) return;

    const item = words[order[current]];
    const ans = document.getElementById("answer").value.trim().toLowerCase();
    const correct = item.word.trim().toLowerCase();

    userAnswers[current] = document.getElementById("answer").value.trim();

    if (ans === correct) {
      checkedStatus[current] = true;
      document.getElementById("result").innerText = "✅ Correct";
    } else {
      checkedStatus[current] = false;
      document.getElementById("result").innerText = `❌ Correct answer: ${item.word}`;
    }

    updateLiveScore();
  }

  function nextWord() {
    userAnswers[current] = document.getElementById("answer").value.trim();

    if (current < words.length - 1) {
      current++;
      loadWord();
    } else {
      document.getElementById("result").innerText = "🎉 Reached the last word";
    }
  }

  function submitQuiz() {
    userAnswers[current] = document.getElementById("answer").value.trim();

    let score = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let unansweredCount = 0;

    const correctItems = [];
    const wrongItems = [];
    const unansweredItems = [];

    for (let i = 0; i < words.length; i++) {
      const item = words[order[i]];
      const user = (userAnswers[i] || "").trim();
      const correct = item.word.trim();

      if (user === "") {
        unansweredCount++;
        unansweredItems.push(
          `<div class="summary-item unanswered"><b>${i + 1}.</b> Correct: ${correct}</div>`
        );
      } else if (user.toLowerCase() === correct.toLowerCase()) {
        score++;
        correctCount++;
        correctItems.push(
          `<div class="summary-item correct"><b>${i + 1}.</b> ${correct}</div>`
        );
      } else {
        wrongCount++;
        wrongItems.push(
          `<div class="summary-item wrong"><b>${i + 1}.</b> Your answer: ${user} | Correct: ${correct}</div>`
        );
      }
    }

    document.getElementById("finalScoreText").innerText = `Score: ${score} / ${words.length}`;

    document.getElementById("overviewBox").innerHTML = `
      <div class="summary-item"><b>Total Questions:</b> ${words.length}</div>
      <div class="summary-item correct"><b>Correct:</b> ${correctCount}</div>
      <div class="summary-item wrong"><b>Wrong:</b> ${wrongCount}</div>
      <div class="summary-item unanswered"><b>Unanswered:</b> ${unansweredCount}</div>
    `;

    document.getElementById("correctList").innerHTML =
      correctItems.length ? correctItems.join("") : `<div class="summary-item">-</div>`;

    document.getElementById("wrongList").innerHTML =
      wrongItems.length ? wrongItems.join("") : `<div class="summary-item">-</div>`;

    document.getElementById("unansweredList").innerHTML =
      unansweredItems.length ? unansweredItems.join("") : `<div class="summary-item">-</div>`;

    document.getElementById("gamePage").classList.add("hidden");
    document.getElementById("uploadPage").classList.add("hidden");
    document.getElementById("summaryPage").classList.remove("hidden");
  }

  document.addEventListener("keydown", function(e) {
    const gameVisible = !document.getElementById("gamePage").classList.contains("hidden");
    if (!gameVisible) return;

    if (e.key === "Enter") {
      e.preventDefault();
      checkAnswer();
    }
  });
</script>
